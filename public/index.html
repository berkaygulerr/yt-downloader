<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Video Downloader</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1e1e1e;
      padding: 30px;
      border-radius: 10px;
      width: 400px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .progress {
      margin-top: 20px;
    }

    .bar {
      width: 100%;
      height: 20px;
      background: #333;
      border-radius: 5px;
      overflow: hidden;
    }

    .bar-inner {
      height: 100%;
      width: 0%;
      background: #4CAF50;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Video Downloader</h2>
    <input id="url" placeholder="Video URL">
    <button onclick="startDownload()">Download</button>

    <div class="progress">
      <div class="bar">
        <div class="bar-inner" id="bar"></div>
      </div>
      <p id="status">Bekliyor...</p>
    </div>
  </div>

<script>
let downloadId = null;

function startDownload() {
  const url = document.getElementById("url").value;

  fetch(`http://localhost:3001/download?url=${url}`)
    .then(res => res.json())
    .then(data => {
      downloadId = data.id;
      checkProgress();
    });
}

function checkProgress() {
  const interval = setInterval(() => {
    fetch(`http://localhost:3001/progress/${downloadId}`)
      .then(res => res.json())
      .then(data => {
        if (!data) return;

        document.getElementById("bar").style.width = data.progress + "%";
        document.getElementById("status").innerText =
          data.progress + "% | " + data.speed + " | ETA: " + data.eta;

        if (data.status === "finished") {
          clearInterval(interval);
          window.location = `http://localhost:3001/file/${downloadId}`;
        }
      });
  }, 1000);
}
</script>

</body>
</html>
